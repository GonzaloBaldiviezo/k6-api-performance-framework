name: Load Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  moderate-load:
    name: Moderate Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOREST_BASE_URL: https://gorest.co.in/public/v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build

      - name: Run moderate load test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports
          k6 run \
            --summary-export reports/moderate-summary.json \
            dist/tests/load/gorest.moderate.load.js \
            | tee reports/moderate.log

      - name: Compare against baseline
        shell: bash
        run: |
          if [ ! -f baselines/moderate.json ]; then
            echo "::error::Missing baseline file: baselines/moderate.json"
            echo "Run 'pnpm run baseline:set:moderate' and commit baselines/moderate.json before enabling CI comparison."
            exit 1
          fi
          node scripts/baseline-compare.mjs baselines/moderate.json reports/moderate-summary.json | tee reports/moderate-baseline-compare.md

      - name: Prepare history seed
        if: always()
        shell: bash
        env:
          HISTORY_BRANCH: perf-history
        run: |
          set -euo pipefail
          mkdir -p reports
          rm -rf .history-tmp
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" "$HISTORY_BRANCH" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$HISTORY_BRANCH" "$REPO_URL" .history-tmp
          else
            git clone --depth 1 "$REPO_URL" .history-tmp
            cd .history-tmp
            git checkout --orphan "$HISTORY_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p history
            printf '{\n  "version": 1,\n  "updatedAt": null,\n  "entries": []\n}\n' > history/moderate-history.json
            git add history/moderate-history.json
            git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m 'chore(history): initialize moderate history'
            git push origin "$HISTORY_BRANCH"
            cd ..
          fi

          mkdir -p reports
          if [ -f .history-tmp/history/moderate-history.json ]; then
            cp .history-tmp/history/moderate-history.json reports/moderate-history.json
          else
            printf '{\n  "version": 1,\n  "updatedAt": null,\n  "entries": []\n}\n' > reports/moderate-history.json
          fi

      - name: Append run to history
        if: always()
        env:
          K6_PROFILE: moderate
        run: |
          node scripts/history-append.mjs \
            reports/moderate-summary.json \
            baselines/moderate.json \
            reports/moderate-history.json \
            reports/history-entry.json

      - name: Persist history branch
        if: always()
        shell: bash
        env:
          HISTORY_BRANCH: perf-history
        run: |
          set -euo pipefail
          test -d .history-tmp
          mkdir -p .history-tmp/history
          cp reports/moderate-history.json .history-tmp/history/moderate-history.json
          cp reports/history-entry.json .history-tmp/history/latest-entry.json
          cd .history-tmp
          git add history/moderate-history.json history/latest-entry.json
          if git diff --cached --quiet; then
            echo "No history changes to commit."
            exit 0
          fi
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(history): append moderate run #${{ github.run_number }}"
          git push origin "${HISTORY_BRANCH}"

      - name: Publish load summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          if (!fs.existsSync('reports/moderate-summary.json')) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Moderate Load Summary\n\nNo summary file was generated.\n');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync('reports/moderate-summary.json', 'utf8'));
          const metrics = summary.metrics || {};
          const p95 = metrics.http_req_duration?.['p(95)'] ?? 'n/a';
          const p90 = metrics.http_req_duration?.['p(90)'] ?? 'n/a';
          const failed = metrics.http_req_failed?.value ?? 'n/a';
          const throughput = metrics.http_reqs?.rate ?? 'n/a';
          const lines = [
            '## Moderate Load Summary',
            '',
            '| Metric | Value |',
            '| --- | --- |',
            `| http_req_duration p(90) | ${p90} |`,
            `| http_req_duration p(95) | ${p95} |`,
            `| http_req_failed rate | ${failed} |`,
            `| Throughput (req/s) | ${throughput} |`
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');

          if (fs.existsSync('reports/moderate-baseline-compare.md')) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n## Baseline Comparison\n\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, fs.readFileSync('reports/moderate-baseline-compare.md', 'utf8') + '\n');
          } else {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n## Baseline Comparison\n\nNo comparison output was generated.\n');
          }
          EOF

      - name: Upload load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moderate-load-report-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/moderate-summary.json
            reports/moderate.log
            reports/moderate-baseline-compare.md
            reports/moderate-history.json
            reports/history-entry.json
