name: Load Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  moderate-load:
    name: Moderate Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOREST_BASE_URL: https://gorest.co.in/public/v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build

      - name: Run moderate load test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports
          k6 run \
            --summary-export reports/moderate-summary.json \
            dist/tests/load/gorest.moderate.load.js \
            | tee reports/moderate.log

      - name: Compare against baseline
        shell: bash
        run: |
          if [ ! -f baselines/moderate.json ]; then
            echo "::error::Missing baseline file: baselines/moderate.json"
            echo "Run 'pnpm run baseline:set:moderate' and commit baselines/moderate.json before enabling CI comparison."
            exit 1
          fi
          node scripts/baseline-compare.mjs baselines/moderate.json reports/moderate-summary.json | tee reports/moderate-baseline-compare.md

      - name: Publish load summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          if (!fs.existsSync('reports/moderate-summary.json')) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Moderate Load Summary\n\nNo summary file was generated.\n');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync('reports/moderate-summary.json', 'utf8'));
          const metrics = summary.metrics || {};
          const p95 = metrics.http_req_duration?.['p(95)'] ?? 'n/a';
          const p90 = metrics.http_req_duration?.['p(90)'] ?? 'n/a';
          const failed = metrics.http_req_failed?.value ?? 'n/a';
          const throughput = metrics.http_reqs?.rate ?? 'n/a';
          const lines = [
            '## Moderate Load Summary',
            '',
            '| Metric | Value |',
            '| --- | --- |',
            `| http_req_duration p(90) | ${p90} |`,
            `| http_req_duration p(95) | ${p95} |`,
            `| http_req_failed rate | ${failed} |`,
            `| Throughput (req/s) | ${throughput} |`
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');

          if (fs.existsSync('reports/moderate-baseline-compare.md')) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n## Baseline Comparison\n\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, fs.readFileSync('reports/moderate-baseline-compare.md', 'utf8') + '\n');
          } else {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n## Baseline Comparison\n\nNo comparison output was generated.\n');
          }
          EOF

      - name: Upload load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moderate-load-report-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/moderate-summary.json
            reports/moderate.log
            reports/moderate-baseline-compare.md
